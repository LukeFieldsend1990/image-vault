name = "image-vault"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"


# -------------------------------------------------------------------
# R2 Buckets
# -------------------------------------------------------------------
[[r2_buckets]]
binding = "SCANS_BUCKET"
bucket_name = "image-vault-scans"
preview_bucket_name = "image-vault-scans-dev"

[[r2_buckets]]
binding = "PIPELINE_BUCKET"
bucket_name = "image-vault-pipeline"
preview_bucket_name = "image-vault-pipeline-dev"

# -------------------------------------------------------------------
# D1 Database
# -------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "image-vault-db"
database_id = "71665618-0498-48bd-a243-962eb4810769"
migrations_dir = "drizzle/migrations"

# -------------------------------------------------------------------
# KV Namespaces (sessions, download tokens)
# -------------------------------------------------------------------
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "3d37f156b49348cdad79e28e8812b7e3"
preview_id = "3570e35d13f245c294ab8b0ef2d6a680"

# -------------------------------------------------------------------
# Environment Variables (non-secret)
# -------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
APP_URL = "https://changling.io"
NEXT_PUBLIC_BASE_URL = "https://changling.io"
RESEND_FROM_EMAIL = "Changling <noreply@changling.io>"
CF_ACCOUNT_ID = "2db6ad770fad71b79fa3249b202c6c37"          # Cloudflare account ID (from dash.cloudflare.com → top-right)
R2_BUCKET_NAME = "image-vault-scans"   # override with "image-vault-scans-dev" for preview

# -------------------------------------------------------------------
# Queues (producers — Pages Functions can send; consumer is pipeline-worker/)
# -------------------------------------------------------------------
[[queues.producers]]
binding = "PIPELINE_QUEUE"
queue = "pipeline-jobs"

# -------------------------------------------------------------------
# Workers AI
# -------------------------------------------------------------------
[ai]
binding = "AI"

# -------------------------------------------------------------------
# Secrets (set via: wrangler secret put SECRET_NAME)
# -------------------------------------------------------------------
# ENCRYPTION_MASTER_KEY   - Server-side key wrapping key
# JWT_SECRET              - JWT signing secret
# RESEND_API_KEY          - Email notifications
# TWILIO_ACCOUNT_SID      - SMS 2FA
# TWILIO_AUTH_TOKEN       - SMS 2FA
# TWILIO_FROM_NUMBER      - SMS 2FA
# R2_ACCESS_KEY_ID        - R2 API token access key (for presigned upload URLs)
# R2_SECRET_ACCESS_KEY    - R2 API token secret access key (for presigned upload URLs)
# TMDB_API_KEY            - The Movie Database API key (free at themoviedb.org) for talent onboarding
# MESHY_API_KEY           - Meshy API key for GLB preview generation (pipeline stage 3)
# BRIDGE_SIGNING_KEY_JWK  - P-256 private key JWK for signing Bridge grant manifests
#                           Generate with: node scripts/generate-bridge-key.mjs
# ANTHROPIC_API_KEY       - Anthropic API key for Claude Haiku (AI features: fee guidance, licence summaries)
